<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Success Engravers Pvt.Ltd</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* Keep your full CSS SAME (no change needed) */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Roboto',sans-serif;background:#fff;color:#064663;}
    main{max-width:900px;margin:60px auto;padding:20px;}
    h1{text-align:center;margin-bottom:20px;}

    form.contact-form{
      background:#f0f7f9;
      padding:30px;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input, textarea{
      padding:12px;
      border-radius:8px;
      border:1px solid #073642;
    }

    button{
      background:#ef476f;
      color:#fff;
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .form-message{
      display:none;
      text-align:center;
      padding:10px;
      margin-top:10px;
      background:#d1efef;
    }
  </style>
</head>

<body>

  <main>
    <h1>Contact Us</h1>

    <!-- ✅ FORM -->
    <form class="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="text" name="subject" placeholder="Subject" required>
      <textarea name="message" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>

      <div id="formMessage" class="form-message"></div>
    </form>

  </main>

  <!-- ✅ CONNECT MAIL.JS -->
  <script type="module" src="mail.js"></script>

</body>
</html>
