<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Company Documents | Success Engraves Pvt.Ltd</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0;}
    body {
      font-family: 'Roboto', sans-serif;
      background: #fff;
      color: #064663;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #e6f0f3; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 10px rgba(2,128,144,0.15); position: sticky; top: 0; z-index: 100; color: #028090;
    }
    .brand-logo { display: flex; align-items: center; gap: 10px; user-select: none; cursor:pointer;}
    .brand-logo img { height: 40px; border-radius: 8px; }
    .brand-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: #028090;
    }
    nav ul { display: flex; list-style: none; gap: 30px; }
    nav ul li a {
      font-weight: 600; color: #028090; font-size: 1.08rem;
      padding: 3px 0;
      transition: color 0.3s;
      text-decoration:none;
    }
    nav ul li a.active, nav ul li a:hover { color: #ef476f; }
    nav ul li a.active::after, nav ul li a:hover::after {
      content: '';
      display: block;
      width: 100%;
      border-bottom: 2px solid #ef476f;
      position: absolute;
      left: 0; bottom: -4px;
    }
    .auth-buttons a {
      padding: 8px 18px;
      background: #ef476f;
      color: #ffffff;
      font-weight: 700;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(239,71,111,0.7);
      font-size: 1rem;
      user-select: none;
      text-decoration:none;
    }
    .auth-buttons a:hover {
      background: #ff6f91;
      box-shadow: 0 6px 20px rgba(255,111,145,0.9);
    }
    main {
      flex: 1;
      max-width: 1200px;
      margin: 48px auto 24px auto;
      padding: 0 16px;
      animation: fadeInUp 1.2s;
      width: 100%;
    }
    h2.section-title {
      font-family: 'Montserrat',sans-serif;
      color: #028090;
      margin-bottom:12px;
      margin-top: 0;
      letter-spacing: 1px;
      font-size: 1.15rem;
      font-weight:700;
    }
    form {
      margin-bottom: 13px;
    }
    table.companydocs-list {
      width:100%;
      border-collapse:collapse;
    }
    table.companydocs-list th, table.companydocs-list td {
      border:1px solid #028090;
      padding: 7px 10px;
      text-align: center;
    }
    table.companydocs-list th {
      background:#028090;
      color:#fff;
    }
    .download-btn {
      background: #028090;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .download-btn:hover {
      background: #026b6b;
    }
    footer {
      text-align: center;
      padding: 20px 10px;
      font-size: 0.85rem;
      background: #e6f0f3;
      color: #05505a;
      box-shadow: 0 -2px 10px rgba(14,81,92,0.2);
      letter-spacing: 1px;
      font-weight: 600;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand-logo" onclick="window.location.href='dashboard.html'">
      <img src="assets/success.jpg" alt="Success Engravers Logo" />
      <span class="brand-title">SUCCESS ENGRAVERS PVT.LTD</span>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="files.html">Files</a></li>
        <li><a href="employee.html">Employees</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="leave.html">Leave</a></li>
        <li><a href="assets.html">Assets</a></li>
        <li><a href="companydocs.html" class="active">Company Docs</a></li>
      </ul>
    </nav>
    <div class="auth-buttons">
      <a href="signin.html">Sign In</a>
    </div>
  </header>
  <main>
    <section id="companyDocsSection" class="active">
      <h2 class="section-title">Company Documents</h2>
      <form id="companyDocsForm">
        <input type="file" id="companyDocInput" multiple /> 
        <button class="template-btn" id="companyDocUploadBtn" type="submit">Upload</button>
      </form>
      <table class="companydocs-list" id="companyDocsTable">
        <thead>
          <tr><th>File Name</th><th>Type</th><th>Action</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <footer>
    &copy; 2025 SUCCESS ENGRAVERS PVT.LTD. All rights reserved.
  </footer>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    let companyDocs = JSON.parse(localStorage.getItem('companyDocs')||'[]');

    function renderCompanyDocsTable() {
      const tbody = $('#companyDocsTable tbody').empty();
      if (!companyDocs.length) {
        tbody.append('<tr><td colspan="3" style="text-align:center;">No docs.</td></tr>');
        return;
      }
      companyDocs.forEach(doc => {
        const row = $('<tr></tr>');
        const span = $('<span>').text(doc.file.name).css({ cursor:'pointer', color:'#028090','text-decoration':'underline' })
          .on('click', () => window.open(doc.url, '_blank'));
        row.append($('<td>').append(span));
        row.append($('<td>').text(doc.file.type||'N/A'));
        const downloadBtn = $('<button>').addClass('download-btn').text('Download').on('click', function(){
          const a=document.createElement('a'); a.href=doc.url;a.download=doc.file.name;document.body.appendChild(a);a.click();document.body.removeChild(a);
        });
        row.append($('<td>').append(downloadBtn));
        tbody.append(row);
      });
    }

    $('#companyDocsForm').on('submit',function(e){
      e.preventDefault();
      let files = $('#companyDocInput')[0].files;
      if (!files.length) { alert('Select at least one file.'); return; }
      for (let f of files) {
        // Save basic info and URL reference
        companyDocs.push({ file: {name: f.name, type: f.type}, url: URL.createObjectURL(f) });
      }
      localStorage.setItem('companyDocs', JSON.stringify(companyDocs));
      $('#companyDocInput').val('');
      renderCompanyDocsTable();
    });

    renderCompanyDocsTable();
  </script>
</body>
</html>
