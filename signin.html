<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Success Engraves Pvt.Ltd - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #064663;
      overflow: hidden;
    }

    .container {
      width: 90vw;
      max-width: 480px;
      max-height: 95vh;
      padding: 30px 30px 40px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(2, 128, 144, 0.15);
      border-radius: 18px;
      animation: fadeInScale 0.8s ease forwards;
      overflow-y: auto;
      color: #064663;
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.85);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .auth-card {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
    }

    h2#form-title {
      text-align: center;
      margin-bottom: 40px;
      color: #028090;
      font-weight: 900;
      letter-spacing: 0.15em;
      font-size: 2.9rem;
      text-shadow: 1px 1px 4px rgba(2, 128, 144, 0.25);
      animation: titleBounce 1s cubic-bezier(.28,.84,.42,1) forwards;
    }

    @keyframes titleBounce {
      0% {
        opacity: 0;
        transform: translateY(-30px);
      }
      50% {
        opacity: 1;
        transform: translateY(12px);
      }
      100% {
        transform: translateY(0);
      }
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(.4,0,.2,1), opacity 0.45s ease;
      position: relative;
      will-change: opacity, max-height;
    }

    form.active {
      opacity: 1;
      max-height: 580px;
      animation: slideFadeIn 0.6s ease forwards;
    }

    @keyframes slideFadeIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    input[type="email"], input[type="password"], input[type="text"] {
      padding: 16px 20px;
      border-radius: 10px;
      border: 2px solid #028090;
      font-size: 18px;
      font-weight: 600;
      color: #064663;
      background: #f9f9f9;
      box-shadow: inset 0 1px 5px rgba(2, 128, 144, 0.15);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
      letter-spacing: 0.02em;
    }

    input[type="email"]:focus, input[type="password"]:focus, input[type="text"]:focus {
      border-color: #ef476f;
      box-shadow: 0 0 18px rgba(239, 71, 111, 0.75);
      outline: none;
      background: #fff5f7;
      animation: inputGlow 1.6s ease infinite alternate;
    }

    @keyframes inputGlow {
      0% {
        box-shadow: 0 0 12px rgba(239, 71, 111, 0.6);
      }
      100% {
        box-shadow: 0 0 25px rgba(239, 71, 111, 0.9);
      }
    }

    input::placeholder {
      color: #05505a;
      font-weight: 500;
      font-style: italic;
      letter-spacing: 0.03em;
    }

    button.btn {
      padding: 16px 0;
      border-radius: 14px;
      border: none;
      background: linear-gradient(145deg, #ef476f, #d73a63);
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(239, 71, 111, 0.8);
      transition: background 0.3s ease, box-shadow 0.4s ease, transform 0.3s cubic-bezier(.4,0,.2,1);
      user-select: none;
    }

    button.btn:hover, button.btn:focus {
      background: linear-gradient(145deg, #ff7f91, #e0486b);
      box-shadow: 0 14px 32px rgba(255, 127, 145, 0.9);
      outline: none;
      transform: translateY(-4px) scale(1.05);
      text-shadow: 0 0 8px #ff9cb0;
    }

    button.btn:active {
      transform: translateY(-1px) scale(0.97);
      box-shadow: 0 6px 16px rgba(239, 71, 111, 0.7);
      transition: transform 0.1s ease;
    }

    .message {
      margin-top: 32px;
      font-size: 17px;
      color: #ef476f;
      text-align: center;
      letter-spacing: 0.05em;
      font-weight: 600;
      opacity: 0.95;
      animation: messageFadeIn 2s ease forwards;
    }

    @keyframes messageFadeIn {
      0% {
        opacity: 0;
        transform: translateY(18px);
      }
      100% {
        opacity: 0.95;
        transform: translateY(0);
      }
    }

    .message .link {
      cursor: pointer;
      font-weight: 800;
      color: #ef476f;
      transition: color 0.3s ease;
      text-decoration: underline;
    }

    .message .link:hover {
      color: #ff7f91;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        width: 95vw;
        padding: 25px 20px 30px;
      }

      h2#form-title {
        font-size: 2.3rem;
      }

      button.btn {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container" role="main" aria-label="Authentication Form" tabindex="-1">
    <div class="auth-card">
      <h2 id="form-title">Login</h2>

      <form id="login-form" class="active" aria-hidden="false" autocomplete="on">
        <input type="email" id="login-email" name="login-email" placeholder="Email" required aria-label="Email Address" autocomplete="username" />
        <input type="password" id="login-password" name="login-password" placeholder="Password" required aria-label="Password" autocomplete="current-password" />
        <button type="submit" class="btn" aria-label="Submit Login">Login</button>
      </form>

      <form id="signup-form" class="hidden" aria-hidden="true" autocomplete="on">
        <input type="text" id="signup-name" name="signup-name" placeholder="Full Name" required aria-label="Full Name" autocomplete="name" />
        <input type="email" id="signup-email" name="signup-email" placeholder="Email" required aria-label="Email Address" autocomplete="email" />
        <input type="password" id="signup-password" name="signup-password" placeholder="Password" required aria-label="Password" autocomplete="new-password" />
        <button type="submit" class="btn" aria-label="Submit Sign Up">Sign Up</button>
      </form>

      <div class="message" id="toggle-message">
        Don't have an account? <span id="toggle-link" class="link" role="button" tabindex="0" aria-pressed="false">Sign up</span>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function () {
      const loginForm = $("#login-form");
      const signupForm = $("#signup-form");
      const formTitle = $("#form-title");
      const toggleMessage = $("#toggle-message");
      const toggleLink = $("#toggle-link");

      function updateAria(activeForm) {
        if (activeForm === 'login') {
          loginForm.attr('aria-hidden', 'false');
          signupForm.attr('aria-hidden', 'true');
          toggleLink.attr('aria-pressed', 'false');
        } else {
          signupForm.attr('aria-hidden', 'false');
          loginForm.attr('aria-hidden', 'true');
          toggleLink.attr('aria-pressed', 'true');
        }
      }

      function toggleForms() {
        if (loginForm.hasClass("active")) {
          loginForm.removeClass("active").addClass("hidden");
          signupForm.removeClass("hidden").addClass("active");
          formTitle.text("Sign Up");
          toggleMessage.html('Already have an account? <span id="toggle-link" class="link" role="button" tabindex="0" aria-pressed="true">Login</span>');
          updateAria('signup');
        } else {
          signupForm.removeClass("active").addClass("hidden");
          loginForm.removeClass("hidden").addClass("active");
          formTitle.text("Login");
          toggleMessage.html('Don\'t have an account? <span id="toggle-link" class="link" role="button" tabindex="0" aria-pressed="false">Sign up</span>');
          updateAria('login');
        }
      }

      $("#toggle-message").on("click keydown", "#toggle-link", function (e) {
        if (e.type === "click" || (e.type === "keydown" && (e.key === "Enter" || e.key === " "))) {
          toggleForms();
          e.preventDefault();
        }
      });

      $("#login-form, #signup-form").submit(function (e) {
        e.preventDefault();
        window.location.href = "index.html";
      });
    });
  </script>

</body>
</html>
