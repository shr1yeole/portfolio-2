<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Success Engraves Pvt.Ltd - Home</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* Reset */
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #ffffff;
      color: #064663;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }

    /* Header */
    header {
      background: #e6f0f3;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(6, 70, 99, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 1s ease forwards;
    }
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .brand-logo img {
      height: 40px;
      border-radius: 8px;
      animation: fadeIn 1.5s 0.3s ease forwards;
    }
    .brand-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #028090;
      letter-spacing: 2px;
      text-shadow: 1px 1px 2px rgba(2, 128, 144, 0.7);
      animation: fadeIn 1.5s 0.5s ease forwards;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 25px;
      animation: fadeIn 1.5s 0.7s ease forwards;
    }
    nav ul li a {
      font-weight: 600;
      color: #028090;
      font-size: 1.1rem;
      position: relative;
      padding: 5px 0;
      transition: color 0.3s ease;
    }
    nav ul li a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0; left: 0;
      background-color: #ef476f;
      transition: width 0.3s ease;
    }
    nav ul li a:hover {
      color: #ef476f;
    }
    nav ul li a:hover::after {
      width: 100%;
    }
    .auth-buttons a {
      margin-left: 15px;
      padding: 8px 18px;
      background: #ef476f;
      color: #ffffff;
      font-weight: 700;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(239, 71, 111, 0.7);
      transition: background 0.3s ease, color 0.3s ease;
      font-size: 1rem;
      user-select: none;
    }
    .auth-buttons a:hover {
      background: #ff6f91;
      color: #fff;
      box-shadow: 0 6px 20px rgba(255, 111, 145, 0.9);
    }

    /* Hero Section */
    main.hero-section {
      flex-grow: 1;
      display: flex;
      max-width: 1200px;
      margin: 40px auto;
      box-shadow: 0 20px 55px rgba(14, 81, 92, 0.15);
      border-radius: 15px;
      overflow: hidden;
      animation: fadeInUp 1.5s ease forwards;
      background: #f0f9ff;
      color: #064663;
    }
    .hero-content {
      display: flex;
      width: 100%;
    }
    .text-content {
      flex: 1;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }
    .text-content h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.2rem;
      font-weight: 900;
      line-height: 1.1;
      color: #028090;
    }
    .text-content h1 .highlight {
      color: #ef476f;
      text-shadow: 2px 2px 10px rgba(239, 71, 111, 0.6);
    }
    .text-content h3.subheading {
      font-weight: 400;
      font-size: 1.6rem;
      font-style: italic;
      color: #05505a;
    }
    .text-content p {
      font-size: 1.25rem;
      line-height: 1.6;
      color: #073642;
    }
    .text-content button.read-more {
      align-self: flex-start;
      margin-top: 15px;
      padding: 12px 28px;
      border: none;
      background: #ef476f;
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(239, 71, 111, 0.7);
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .text-content button.read-more:hover {
      background: #ff6f91;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 111, 145, 0.9);
    }
    .text-content button.read-more:active {
      transform: translateY(0);
      box-shadow: 0 3px 10px rgba(239, 71, 111, 0.5);
    }
    .image-content {
      flex: 1;
      background: url('https://www.successengravers.com/assets/images/banner_bg2.jpg') center center/cover no-repeat;
      border-top-right-radius: 15px;
      border-bottom-right-radius: 15px;
      animation: slideInRight 1.5s ease forwards;
      filter: drop-shadow(0 0 8px rgba(0,0,0,0.15));
    }

    /* Gallery Section */
    .gallery {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 25px;
      animation: fadeInUp 1s ease forwards;
    }
    .gallery img {
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(239,71,111,0.3);
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(239,71,111,0.5);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px 10px;
      font-size: 0.85rem;
      background: #e6f0f3;
      color: #05505a;
      user-select: none;
      box-shadow: 0 -2px 10px rgba(14, 81, 92, 0.2);
      letter-spacing: 1px;
      font-weight: 600;
      animation: fadeIn 1.8s ease forwards;
      margin-top: 40px;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-60px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* Responsive */
    @media (max-width: 900px) {
      main.hero-section {
        flex-direction: column;
        max-width: 90%;
        padding: 0 20px;
      }
      .image-content {
        height: 250px;
        border-radius: 0 0 15px 15px;
        animation: none;
      }
      .text-content {
        padding: 30px 20px;
      }
      .text-content h1 {
        font-size: 2.4rem;
      }
      .gallery {
        padding: 0 20px;
      }
    }
  </style>
</head>
